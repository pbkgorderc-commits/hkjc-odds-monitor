name: HKJC Hourly Scraper

on:
  schedule:
    # 為了覆蓋情境 A 與 B，每 2 小時執行一次
    - cron: '5 */2 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Hong_Kong  # 強制使用香港時區

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager lxml html5lib

      - name: Run Scraper
        run: python hkjc_scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv || echo "No data changes"
          git commit -m "Auto-update odds: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
