name: HKJC Hourly Scraper

on:
  schedule:
    # 每天每兩小時執行一次 (UTC 0, 2, 4... 對應香港 08, 10, 12...)
    # 為了覆蓋 00:00 AM 到 23:59 PM，建議用最簡單的每兩小時排程
    - cron: '5 */2 * * *'  # 每兩小時的第 5 分鐘執行 (避免整點擁擠)
  workflow_dispatch:

permissions:
  contents: write         # 提升至全域權限，確保所有步驟都能寫入

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 使用內建 Token 確保驗證成功

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper
        run: python hkjc_scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv || echo "No data files to add"
          git commit -m "Auto-update odds: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin main
