name: HKJC Odds Collector

on:
  schedule:
    # 每小時第 15 分鐘執行 (UTC)
    - cron: '15 * * * *'
  workflow_dispatch: # 支援手動啟動

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas selenium webdriver-manager lxml html5lib

      - name: Run Scraper
        run: python hkjc_scraper.py

      - name: Push Data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Github Bot"
          git add data/*.csv data/*.html index.html || echo "No changes"
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Odds Auto-Update: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
