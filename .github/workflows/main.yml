name: HKJC Hourly Scraper

on:
  schedule:
    - cron: '0 * * * *'  # 每個整點執行一次
  workflow_dispatch:      # 允許手動按鈕執行

permissions:
  contents: write         # 提升至全域權限，確保所有步驟都能寫入

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 使用內建 Token 確保驗證成功

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper
        run: python hkjc_scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv || echo "No data files to add"
          git commit -m "Auto-update odds: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push origin main
